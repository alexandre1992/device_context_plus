name: device_context_plus
description: >
  A Flutter plugin that provides enhanced device and app context,
  including iOS Team ID, Android installer source, locale, timezone,
  and system information.

version: 1.0.5
homepage: https://github.com/alexandre1992/device_context_plus
repository: https://github.com/alexandre1992/device_context_plus
issue_tracker: https://github.com/alexandre1992/device_context_plus/issues

topics:
  - device
  - device-info
  - system-info
  - analytics
  - team-id

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.3.0"

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.1.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  plugin:
    platforms:
      android:
        package: br.com.example.device_context_plus
        pluginClass: DeviceContextPlusPlugin
      ios:
        pluginClass: DeviceContextPlusPlugin
